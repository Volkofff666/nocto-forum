[program:laravel-serve]
command=php /var/www/artisan serve --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
